<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lập trình web - Cập nhật</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 12px rgba(0, 0, 0, 0.2);
        }
        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: blue;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h2>Lập trình web</h2>
    <div>
        <a href="#">Home</a> | <a href="login.html">Đăng nhập</a> | <a href="register.html">Đăng ký</a>
    </div>
    <div class="container">
        <h3>Màn hình cập nhật</h3>
        <form>
            <label>Username</label>
            <input type="text" name="username" value="xxx" required>
            <label>Mật khẩu</label>
            <input type="password" name="password" value="xxx" required>
            <label>Nhập lại mật khẩu</label>
            <input type="password" name="confirm_password" value="xxx" required>
            <label>Email</label>
            <input type="email" name="email" value="xxx" required>
            <a href="login.html">Đã có tài khoản</a>
            <button type="submit">Cập nhật</button>
        </form>
    </div>
</body>
</html>
